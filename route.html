<style>

  .kicker{margin-bottom:26px;}
  .langs{display:flex;gap:14px;}
  .langs a{font-family:'IBM Plex Mono','Noto Sans SC',monospace;font-size:10.5px;letter-spacing:0.12em;color:var(--graphite);text-decoration:none;cursor:pointer;}
  .langs a.cur{color:var(--ink);border-bottom:1px solid var(--oxblood);}
  h2{font-weight:400;font-size:clamp(24px,3vw,34px);line-height:1.25;max-width:640px;}
  .trail{font-family:'IBM Plex Mono','Noto Sans SC',monospace;font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--graphite);margin-bottom:34px;line-height:2.1;min-height:20px;}
  .trail b{color:var(--ink);font-weight:500;}
  .opts{margin-top:40px;display:flex;flex-direction:column;}
  .opt{display:block;width:100%;text-align:left;background:none;border:none;border-top:1px solid var(--hairline);padding:20px 8px 20px 0;cursor:pointer;font-family:'EB Garamond','Noto Serif SC',serif;color:var(--ink);}
  .opt:last-child{border-bottom:1px solid var(--hairline);}
  .opt:hover .ol{color:var(--oxblood);}
  .opt .ol{font-size:19px;line-height:1.35;display:block;}
  .opt .od{font-family:'IBM Plex Mono','Noto Sans SC',monospace;font-size:9.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--graphite);margin-top:6px;display:block;line-height:1.8;}
  .back{background:none;border:none;cursor:pointer;font-family:'IBM Plex Mono','Noto Sans SC',monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--graphite);margin-top:36px;padding:0;}
  .back:hover{color:var(--ink);}
  .rescard{border-top:1px solid var(--ink);margin-top:40px;padding-top:24px;}
  .rescard .rlabel{font-family:'IBM Plex Mono','Noto Sans SC',monospace;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--oxblood);margin-bottom:18px;}
  .prog{margin-bottom:26px;}
  .prog .pname{font-size:24px;line-height:1.25;}
  .prog .pmeta{font-family:'IBM Plex Mono','Noto Sans SC',monospace;font-size:9.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--graphite);margin-top:8px;line-height:1.9;}
  .prog .pdesc{font-size:16px;line-height:1.55;margin-top:8px;max-width:600px;}
  .altblock{border-top:1px solid var(--hairline);margin-top:8px;padding-top:20px;}
  .altblock .rlabel2{font-family:'IBM Plex Mono','Noto Sans SC',monospace;font-size:9.5px;letter-spacing:0.2em;text-transform:uppercase;color:var(--graphite);margin-bottom:14px;}
  .alt{margin-bottom:14px;}
  .alt .aname{font-size:17px;}
  .alt .ameta{font-family:'IBM Plex Mono','Noto Sans SC',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--graphite);margin-top:3px;line-height:1.8;}
  .resnote{font-family:'IBM Plex Mono','Noto Sans SC',monospace;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--oxblood);line-height:1.9;margin-top:6px;}
  .cta-line{margin-top:40px;display:flex;align-items:center;gap:26px;flex-wrap:wrap;}
  .door{display:inline-block;border:1px solid var(--ink);padding:16px 34px;font-family:'IBM Plex Mono','Noto Sans SC',monospace;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink);text-decoration:none;}
  .door:hover{background:var(--ink);color:var(--paper);}
  .note{font-family:'IBM Plex Mono','Noto Sans SC',monospace;font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--graphite);line-height:2;}

/* ================= ENGINE ================= */
const qp = new URLSearchParams(location.search).get('lang');
let lang = ['en','ru','zh'].includes(qp) ? qp : 'en';
let stack = [];
let cur = {type:'node', id:'passport'};
const app = document.getElementById('app');

function pv(){ return stack.length ? GRAPH.nodes[stack[0].node].opts[stack[0].optIndex].v : 'other'; }
function nx(o){ return typeof o.next === 'string' ? o.next : (o.next[pv()] || o.next.default); }
function resolve(list){
  const ex = e => Array.isArray(e) ? e.includes(pv()) : e === pv();
  return list.filter(e => typeof e === 'string' || ((!e.only || ex(e.only)) && (!e.not || !ex(e.not))))
             .map(e => typeof e === 'string' ? e : e.k);
}
function chrome(){
  document.getElementById('kicker').innerHTML = T[lang].ui.kicker;
  document.getElementById('perimeter').innerHTML = T[lang].ui.perimeter;
  document.documentElement.lang = lang === 'zh' ? 'zh-Hans' : lang;
  const home = lang === 'en' ? 'index.html' : lang + '.html';
  document.getElementById('homelink').href = home;
  const NAV = {en:[['#about','About'],['#practice','Talent Practice'],['#contact','Contact']],
               ru:[['#about','О нас'],['#practice','Talent Practice'],['#contact','Контакты']],
               zh:[['#about','关于'],['#practice','人才项目'],['#contact','联系']]};
  document.getElementById('rnav').innerHTML = NAV[lang].map(x => '<a href="' + home + x[0] + '">' + x[1] + '</a>').join('');
  document.querySelectorAll('.langs a').forEach(a => a.classList.toggle('cur', a.dataset.lang === lang));
}
function trailHtml(){
  return stack.map(s => {
    const nt = T[lang].nodes[s.node];
    return nt.k + ' — <b>' + nt.o[s.optIndex][0].toUpperCase() + '</b>';
  }).join(' &nbsp;·&nbsp; ');
}
function renderNode(id){
  cur = {type:'node', id};
  const n = GRAPH.nodes[id], nt = T[lang].nodes[id];
  app.innerHTML =
    '<div class="trail">' + trailHtml() + '</div>' +
    '<h2>' + nt.q + '</h2>' +
    '<div class="opts">' + n.opts.map((o,i) =>
      '<button class="opt" data-i="' + i + '"><span class="ol">' + nt.o[i][0] + '</span>' +
      (nt.o[i][1] ? '<span class="od">' + nt.o[i][1] + '</span>' : '') + '</button>'
    ).join('') + '</div>' +
    (stack.length ? '<button class="back" id="back">' + T[lang].ui.back + '</button>' : '');
  app.querySelectorAll('.opt').forEach(btn => btn.addEventListener('click', () => {
    const i = +btn.dataset.i, o = n.opts[i];
    stack.push({node:id, optIndex:i});
    o.res ? renderResult(o.res) : renderNode(nx(o));
  }));
  const b = document.getElementById('back');
  if(b) b.addEventListener('click', goBack);
}
function progHtml(key, small){
  const p = T[lang].progs[key];
  const flag = (p.f && p.f[pv()]) ? '<div class="resnote">' + p.f[pv()] + '</div>' : '';
  return small
    ? '<div class="alt"><div class="aname">' + p.n + '</div><div class="ameta">' + p.m + '</div>' + flag + '</div>'
    : '<div class="prog"><div class="pname">' + p.n + '</div><div class="pmeta">' + p.m + '</div><div class="pdesc">' + p.d + '</div>' + flag + '</div>';
}
function renderResult(rid){
  cur = {type:'res', id:rid};
  const r = GRAPH.res[rid], rt = T[lang].res[rid];
  const rp = resolve(r.p), ra = resolve(r.a);
  const profile = stack.map(s => {
    const nt = T[lang].nodes[s.node]; return nt.k + ': ' + nt.o[s.optIndex][0];
  }).join('\n');
  const mail = 'mailto:office@tacet.group?subject=Assessment%20request&body=' +
    encodeURIComponent(T[lang].ui.mailHead + '\n' + profile + '\n\n' + T[lang].ui.mailTail);
  app.innerHTML =
    '<div class="trail">' + trailHtml() + '</div>' +
    '<h2>' + rt.t + '</h2>' +
    (rp.length ? '<div class="rescard"><div class="rlabel">' + T[lang].ui.rlabel + '</div>' +
      rp.map(k => progHtml(k,false)).join('') + '</div>' : '') +
    (ra.length ? '<div class="altblock"><div class="rlabel2">' + T[lang].ui.rlabel2 + '</div>' + ra.map(k => progHtml(k,true)).join('') + '</div>' : '') +
    (rt.note ? '<div class="resnote" style="margin-top:22px;">' + rt.note + '</div>' : '') +
    ((r.pn || []).includes(pv()) ? '<div class="resnote" style="margin-top:12px;">' + T[lang].cnCit + '</div>' : '') +
    '<div class="cta-line"><a class="door" href="' + mail + '">' + T[lang].ui.cta + '</a>' +
    '<span class="note">' + T[lang].ui.ctaNote + '</span></div>' +
    '<button class="back" id="back">' + T[lang].ui.back + '</button> &nbsp;&nbsp;' +
    (r.jump ? '<button class="back" id="jump">' + rt.jump + ' &rarr;</button> &nbsp;&nbsp;' : '') +
    '<button class="back" id="restart">' + T[lang].ui.restart + '</button>';
  document.getElementById('back').addEventListener('click', goBack);
  document.getElementById('restart').addEventListener('click', () => { stack = []; renderNode('passport'); });
  if(r.jump){
    document.getElementById('jump').addEventListener('click', () => {
      stack = [stack[0], {node:'goal', optIndex:r.jump.via}];
      renderNode(r.jump.node);
    });
  }
}
function goBack(){
  const last = stack.pop();
  renderNode(last ? last.node : 'passport');
}
document.querySelectorAll('.langs a').forEach(a => a.addEventListener('click', e => {
  e.preventDefault();
  lang = a.dataset.lang;
  chrome();
  cur.type === 'node' ? renderNode(cur.id) : renderResult(cur.id);
}));
chrome();
renderNode('passport');
</script>
