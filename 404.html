<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TACET · 404</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#F7F5EF">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--paper:#F7F5EF;--ink:#1C1A16;--graphite:#6F6A5F;--hairline:#D8D4C8;--oxblood:#7E2622;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--paper);color:var(--ink);font-family:'EB Garamond',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px;}
  .wordmark{font-size:clamp(48px,8vw,84px);letter-spacing:0.30em;padding-left:0.30em;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .code{font-size:11px;letter-spacing:0.24em;text-transform:uppercase;color:var(--graphite);margin-top:22px;}
  .accent{width:44px;height:2px;background:var(--oxblood);margin:30px auto;}
  .line{font-size:19px;line-height:1.5;}
  .door{display:inline-block;border:1px solid var(--ink);padding:14px 30px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink);text-decoration:none;margin-top:34px;}
  .door:hover{background:var(--ink);color:var(--paper);}
</style>
</head>
<body>
<div>
  <div class="wordmark">TACET</div>
  <div class="mono code">404 · Page not found</div>
  <div class="accent"></div>
  <p class="line">The page does not exist — the office does.</p>
  <a class="door" href="/">tacet.group</a>
</div>
</body>
</html>
